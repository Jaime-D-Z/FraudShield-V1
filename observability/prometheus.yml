global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: transaction-service
    static_configs:
      - targets: ["transaction-service:8000"]

  - job_name: risk-engine
    static_configs:
      - targets: ["risk-engine:8000"]

  - job_name: audit-service
    static_configs:
      - targets: ["audit-service:8000"]

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
